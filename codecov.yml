codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  - "website/**"
  - "docs/**"
  - "npm/agentsync/lib/**"
  - "openspec/**"
  - "tests/**"
  - ".agents/**"
